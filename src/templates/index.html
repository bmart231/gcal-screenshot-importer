<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas → Google Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --border: #e2e5ee;
      --accent: #4f67ff;
      --accent-hover: #3a4fe0;
      --danger: #e5534b;
      --success: #22a06b;
      --text: #1a1d2e;
      --muted: #7a7f99;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.9rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: #eef0ff;
    }
    #drop-zone svg {
      width: 40px;
      height: 40px;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    #drop-zone p {
      color: var(--muted);
      font-size: 0.9rem;
    }
    #drop-zone strong {
      color: var(--accent);
      cursor: pointer;
    }
    #file-input { display: none; }

    /* Cards area */
    #cards {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Individual card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .card-filename {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
    }
    .card-badges {
      display: flex;
      gap: 0.4rem;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      background: #eef0ff;
      color: var(--accent);
    }
    .badge.warn { background: #fff3e0; color: #e07b20; }

    .card-body { padding: 1rem 1.25rem; }

    .field { margin-bottom: 0.75rem; }
    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .field input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input[type="text"]:focus { border-color: var(--accent); }
    .field .value {
      font-size: 0.95rem;
      font-weight: 500;
    }
    .field .raw-date {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* Work-time toggle row */
    .work-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 99px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    .work-label { font-size: 0.85rem; color: var(--text); }
    .work-hours-input {
      width: 50px;
      padding: 0.25rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
    }

    /* OCR text toggle */
    .ocr-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--accent);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 0.75rem;
      font-family: inherit;
    }
    .ocr-text {
      display: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: pre-wrap;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 0.75rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .ocr-text.visible { display: block; }

    /* Action buttons */
    .card-actions {
      display: flex;
      gap: 0.6rem;
      padding: 0.75rem 1.25rem 1rem;
    }
    .btn {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    /* State overlays */
    .card.state-loading .card-body,
    .card.state-loading .card-actions { opacity: 0.5; pointer-events: none; }

    .card-status {
      display: none;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 500;
      border-top: 1px solid var(--border);
      align-items: center;
      gap: 0.5rem;
    }
    .card-status.visible { display: flex; }
    .card-status.success { color: var(--success); }
    .card-status.error { color: var(--danger); }

    /* Loading card (while uploading) */
    .card-loading {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error card */
    .card-error {
      background: #fff5f5;
      border: 1px solid #ffd0ce;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      color: var(--danger);
    }
    .card-error strong { display: block; margin-bottom: 0.25rem; }
    .card-error pre {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: pre-wrap;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Canvas → Google Calendar</h1>
      <p>Drop a Canvas assignment screenshot to extract the due date and add it to your calendar.</p>
    </header>

    <div id="drop-zone" role="button" aria-label="Upload screenshot">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p><strong>Click to upload</strong> or drag &amp; drop</p>
      <p style="margin-top:0.3rem; font-size:0.78rem;">PNG, JPG, JPEG — multiple files supported</p>
      <input type="file" id="file-input" accept="image/*" multiple />
    </div>

    <div id="cards"></div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const cardsEl  = document.getElementById('cards');

    // --- Drag & drop ---
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

    function handleFiles(files) {
      [...files].forEach(processFile);
    }

    // --- Process a single file ---
    async function processFile(file) {
      const placeholder = addLoadingCard(file.name);

      const formData = new FormData();
      formData.append('file', file);

      let data;
      try {
        const res = await fetch('/preview', { method: 'POST', body: formData });
        data = await res.json();
      } catch (err) {
        placeholder.replaceWith(makeErrorCard(file.name, 'Network error: ' + err.message));
        return;
      }

      if (!data.success) {
        placeholder.replaceWith(makeErrorCard(file.name, data.error, data.extracted_text));
        return;
      }

      placeholder.replaceWith(makePreviewCard(file.name, data));
    }

    // --- Loading placeholder ---
    function addLoadingCard(filename) {
      const el = document.createElement('div');
      el.className = 'card-loading';
      el.innerHTML = `<div class="spinner"></div><span>Processing <strong>${esc(filename)}</strong>…</span>`;
      cardsEl.appendChild(el);
      return el;
    }

    // --- Error card ---
    function makeErrorCard(filename, error, rawText) {
      const el = document.createElement('div');
      el.className = 'card-error';
      el.innerHTML = `<strong>${esc(filename)}</strong>${esc(error)}${rawText ? `<pre>${esc(rawText)}</pre>` : ''}`;
      return el;
    }

    // --- Preview card ---
    function makePreviewCard(filename, data) {
      const card = document.createElement('div');
      card.className = 'card';

      const confBadgeClass = data.date_confidence < 70 ? 'badge warn' : 'badge';

      card.innerHTML = `
        <div class="card-header">
          <span class="card-filename">${esc(filename)}</span>
          <div class="card-badges">
            <span class="badge">OCR ${data.ocr_confidence}%</span>
            <span class="${confBadgeClass}">Date ${data.date_confidence}%</span>
          </div>
        </div>
        <div class="card-body">
          <div class="field">
            <label>Assignment Title</label>
            <input type="text" class="title-input" value="${esc(data.title)}" />
          </div>
          <div class="field">
            <label>Due Date</label>
            <div class="value">${esc(data.due_date)} at ${esc(data.due_time)}</div>
            <div class="raw-date">Extracted: "${esc(data.raw_date)}"</div>
          </div>
          <div class="work-row">
            <label class="toggle">
              <input type="checkbox" class="work-toggle" />
              <span class="slider"></span>
            </label>
            <span class="work-label">Add work block</span>
            <input type="number" class="work-hours-input" value="2" min="1" max="8" title="Hours before due" />
            <span class="work-label" style="color:var(--muted); font-size:0.78rem;">hrs before</span>
          </div>
          <button class="ocr-toggle" type="button">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            Show extracted text
          </button>
          <div class="ocr-text">${esc(data.extracted_text)}</div>
        </div>
        <div class="card-status"></div>
        <div class="card-actions">
          <button class="btn btn-primary add-btn">Add to Calendar</button>
          <button class="btn btn-secondary dismiss-btn">Dismiss</button>
        </div>
      `;

      // OCR text toggle
      const ocrToggle = card.querySelector('.ocr-toggle');
      const ocrText   = card.querySelector('.ocr-text');
      ocrToggle.addEventListener('click', () => {
        const open = ocrText.classList.toggle('visible');
        ocrToggle.querySelector('svg').style.transform = open ? 'rotate(180deg)' : '';
        ocrToggle.childNodes[1].textContent = open ? ' Hide extracted text' : ' Show extracted text';
      });

      // Work block toggle
      const workToggle = card.querySelector('.work-toggle');
      const workHours  = card.querySelector('.work-hours-input');
      workToggle.addEventListener('change', () => {
        workHours.style.opacity = workToggle.checked ? '1' : '0.4';
      });
      workHours.style.opacity = '0.4';

      // Add to Calendar
      card.querySelector('.add-btn').addEventListener('click', async () => {
        const title     = card.querySelector('.title-input').value.trim() || data.title;
        const workTime  = workToggle.checked;
        const hours     = parseInt(workHours.value, 10) || 2;
        await confirmAdd(card, data.temp_id, title, workTime, hours);
      });

      // Dismiss
      card.querySelector('.dismiss-btn').addEventListener('click', async () => {
        await fetch('/dismiss', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ temp_id: data.temp_id })
        });
        card.style.transition = 'opacity 0.2s';
        card.style.opacity = '0';
        setTimeout(() => card.remove(), 200);
      });

      return card;
    }

    async function confirmAdd(card, tempId, title, addWorkTime, workHours) {
      const addBtn     = card.querySelector('.add-btn');
      const dismissBtn = card.querySelector('.dismiss-btn');
      const status     = card.querySelector('.card-status');

      addBtn.disabled = true;
      dismissBtn.disabled = true;
      addBtn.textContent = 'Adding…';

      let data;
      try {
        const res = await fetch('/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ temp_id: tempId, title, add_work_time: addWorkTime, work_hours: workHours })
        });
        data = await res.json();
      } catch (err) {
        showStatus(card, status, false, 'Network error: ' + err.message);
        addBtn.disabled = false;
        dismissBtn.disabled = false;
        addBtn.textContent = 'Add to Calendar';
        return;
      }

      if (data.success) {
        showStatus(card, status, true, `Added to calendar — <a href="${data.link}" target="_blank" style="color:var(--success)">View event</a>`);
        card.querySelector('.card-actions').remove();
      } else {
        showStatus(card, status, false, data.error || 'Unknown error');
        addBtn.disabled = false;
        dismissBtn.disabled = false;
        addBtn.textContent = 'Retry';
      }
    }

    function showStatus(card, statusEl, success, html) {
      statusEl.className = 'card-status visible ' + (success ? 'success' : 'error');
      statusEl.innerHTML = (success
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>'
      ) + html;
    }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
  </script>
</body>
</html>
